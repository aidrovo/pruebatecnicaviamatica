<div class="dashboard">
  <mat-card>
    <h2>Bienvenido 🎉</h2>

    <p>Total usuarios: {{data?.totalUsers}}</p>

    <button mat-raised-button color="warn" (click)="logout()">
      Cerrar sesión
    </button>

    <h3>Subir Excel</h3>

    <input type="file" (change)="onFileSelected($event)">
    <button (click)="upload()">Subir</button>
  </mat-card>
</div>
